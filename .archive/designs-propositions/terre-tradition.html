<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RéviBF – Terre & Tradition</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: #F9F3E7; color: #3B2E22; }
    .hero { background: linear-gradient(135deg, #C0392B 0%, #E67E22 100%); padding: 4rem 1.5rem; text-align: center; clip-path: ellipse(80% 70% at 50% 30%); }
    .hero h1 { font-family: 'Amiri', serif; font-size: 3rem; color: #FFD966; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
    .hero p { color: #FFF3E0; max-width: 600px; margin: 1rem auto; }
    .btn { display: inline-block; padding: 0.8rem 2rem; border-radius: 2rem; font-weight: 700; text-decoration: none; margin: 0.5rem; transition: 0.2s; }
    .btn-primary { background: #FFD966; color: #3B2E22; }
    .btn-secondary { background: transparent; border: 2px solid #FFD966; color: #FFD966; }
    .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; padding: 3rem 1.5rem; }
    .card { background: white; border-radius: 1.5rem; padding: 2rem; width: 240px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); border-bottom: 6px solid #C0392B; }
    .card h2 { font-family: 'Amiri', serif; color: #C0392B; margin-bottom: 0.5rem; }
    .footer { text-align: center; padding: 2rem; color: #8B6E5B; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>RéviBF</h1>
    <p>Révise autrement avec l'esprit du Faso. Annales, quiz, culture.</p>
    <div>
      <a href="#" class="btn btn-primary">BEPC</a>
      <a href="#" class="btn btn-secondary">BAC</a>
    </div>
  </div>
  <div class="cards">
    <div class="card"><h2>📖 Sujets</h2><p>Annales réelles et blancs.</p></div>
    <div class="card"><h2>🧠 Quiz</h2><p>Teste tes connaissances.</p></div>
    <div class="card"><h2>📚 Culture</h2><p>Histoire, sciences, Afrique.</p></div>
  </div>
  <div class="footer">Plateforme gratuite pour les élèves du Burkina Faso</div>
</body>
</html>
