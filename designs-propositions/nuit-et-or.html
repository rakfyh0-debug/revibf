<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RéviBF – Nuit & Or</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Source Sans 3', sans-serif; background: #0F111A; color: #EAEAEA; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; border-bottom: 1px solid #2A2D3A; }
    .logo { font-family: 'Playfair Display', serif; font-size: 2rem; color: #D99A2B; }
    nav ul { display: flex; gap: 2rem; list-style: none; }
    nav a { color: #B0B3C1; text-decoration: none; font-weight: 500; transition: color 0.2s; }
    nav a:hover { color: #D99A2B; }
    .hero { text-align: center; padding: 6rem 2rem; background: radial-gradient(circle at 20% 30%, #1A1D2E 0%, #0F111A 70%); }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: #F5E6C8; margin-bottom: 1rem; }
    .hero p { color: #9A9FB5; max-width: 550px; margin: 0 auto 2rem; font-size: 1.1rem; }
    .btn { display: inline-block; padding: 0.8rem 2.2rem; border-radius: 0.5rem; font-weight: 600; text-decoration: none; margin: 0.5rem; }
    .btn-primary { background: #D99A2B; color: #0F111A; }
    .btn-secondary { border: 2px solid #D99A2B; color: #D99A2B; background: transparent; }
    .cards { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; padding: 4rem 2rem; }
    .card { background: #1A1D2E; border-radius: 1rem; padding: 2rem; width: 240px; border: 1px solid #2A2D3A; transition: border-color 0.3s; }
    .card:hover { border-color: #D99A2B; }
    .card .icon { font-size: 2rem; margin-bottom: 1rem; }
    .card h3 { color: #F5E6C8; margin-bottom: 0.5rem; }
    .card p { color: #9A9FB5; font-size: 0.9rem; }
    footer { text-align: center; padding: 2rem; color: #5A5F72; border-top: 1px solid #2A2D3A; }
  </style>
</head>
<body>
  <header>
    <div class="logo">RéviBF</div>
    <nav>
      <ul>
        <li><a href="#">Accueil</a></li>
        <li><a href="#">BEPC</a></li>
        <li><a href="#">BAC</a></li>
        <li><a href="#">Culture</a></li>
      </ul>
    </nav>
  </header>
  <section class="hero">
    <h1>Révise avec éclat</h1>
    <p>Des ressources sérieuses pour tes examens, dans une ambiance nocturne et concentrée.</p>
    <div>
      <a href="#" class="btn btn-primary">BEPC</a>
      <a href="#" class="btn btn-secondary">BAC</a>
    </div>
  </section>
  <div class="cards">
    <div class="card"><div class="icon">📄</div><h3>Sujets</h3><p>PDF récents et anciens</p></div>
    <div class="card"><div class="icon">🧠</div><h3>Quiz</h3><p>Interactifs et corrigés</p></div>
    <div class="card"><div class="icon">🌍</div><h3>Culture</h3><p>Le monde et le Faso</p></div>
  </div>
  <footer>RéviBF · Nuit & Or · Burkina Faso</footer>
</body>
</html>
