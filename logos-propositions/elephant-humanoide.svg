<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fond soleil -->
  <circle cx="100" cy="100" r="90" fill="#FFC800"/>

  <!-- Corps (gris clair) -->
  <ellipse cx="100" cy="125" rx="45" ry="40" fill="#C8CDD0"/>

  <!-- Ventre -->
  <ellipse cx="100" cy="130" rx="30" ry="30" fill="#F5E6C8"/>

  <!-- Tête -->
  <circle cx="100" cy="80" r="35" fill="#C8CDD0"/>

  <!-- Oreilles (grandes) -->
  <ellipse cx="65" cy="75" rx="22" ry="28" fill="#A8B2B8"/>
  <ellipse cx="135" cy="75" rx="22" ry="28" fill="#A8B2B8"/>

  <!-- Trompe (courbée vers le bas puis relevée) -->
  <path d="M100 95 Q100 120 95 130 Q90 140 95 145" fill="none" stroke="#A8B2B8" stroke-width="10" stroke-linecap="round"/>

  <!-- Yeux (expressifs) -->
  <circle cx="85" cy="75" r="6" fill="#1A1A1A"/>
  <circle cx="115" cy="75" r="6" fill="#1A1A1A"/>
  <!-- Pupilles -->
  <circle cx="87" cy="73" r="2" fill="white"/>
  <circle cx="117" cy="73" r="2" fill="white"/>

  <!-- Sourcils -->
  <path d="M78 68 Q85 63 90 68" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M110 68 Q115 63 122 68" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Bouche (sourire) -->
  <path d="M92 100 Q100 108 108 100" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <!-- Bras humains -->
  <path d="M65 115 L45 135 L40 145" fill="none" stroke="#C8CDD0" stroke-width="8" stroke-linecap="round"/>
  <path d="M135 115 L155 135 L160 145" fill="none" stroke="#C8CDD0" stroke-width="8" stroke-linecap="round"/>

  <!-- Jambes -->
  <path d="M85 155 L85 175 L80 180" fill="none" stroke="#A8B2B8" stroke-width="10" stroke-linecap="round"/>
  <path d="M115 155 L115 175 L120 180" fill="none" stroke="#A8B2B8" stroke-width="10" stroke-linecap="round"/>

  <!-- Livre tenu dans la main droite (optionnel) -->
  <rect x="155" y="135" width="15" height="20" rx="2" fill="#FFC800" transform="rotate(-20 162 145)"/>
  <line x1="158" y1="140" x2="168" y2="140" stroke="#1A1A1A" stroke-width="1" transform="rotate(-20 162 145)"/>
  <line x1="158" y1="145" x2="168" y2="145" stroke="#1A1A1A" stroke-width="1" transform="rotate(-20 162 145)"/>

  <!-- Nom RéviBF -->
  <text x="100" y="195" font-family="Nunito, sans-serif" font-weight="900" font-size="22" fill="#1A1A1A" text-anchor="middle">Révi<span fill="#FFC800">BF</span></text>
</svg>
